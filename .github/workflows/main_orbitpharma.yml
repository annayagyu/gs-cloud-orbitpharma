name: "Orbit Pharma Labs — Build & Deploy to Azure"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo do deploy manual"
        required: false
        default: "Deploy manual solicitado"

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: "orbitpharma"
  ARTIFACT_NAME: "orbitpharma-release"

jobs:
  build:
    name: "Build — Python ${{ env.PYTHON_VERSION }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar instalação das dependências
        run: |
          source antenv/bin/activate
          pip list

      - name: Empacotar artefato para deploy
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            .
            !antenv/
            !.git/
            !.github/
            !__pycache__/
            !*.pyc
          retention-days: 1

  deploy:
    name: "Deploy — Azure App Service (Production)"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    environment:
      name: production
      url: "https://orbitpharma.azurewebsites.net"

    steps:
      - name: Baixar artefato do job de build
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}

      - name: Autenticar no Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5F6832A38F1E4F58A28826EC38B8B782 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_172D7577A5B849D682F3C949C857B7F5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F7601BC79C11443BA032C9D4CFF354B1 }}

      - name: Deploy para Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: ${{ env.APP_NAME }}
          slot-name: "Production"
          startup-command: "python -m streamlit run app.py --server.port 8000 --server.address 0.0.0.0"

      - name: Confirmar URL da aplicação
        run: echo "Aplicação disponível em ${{ steps.deploy-to-webapp.outputs.webapp-url }}"
